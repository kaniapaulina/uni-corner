</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}, "mark": {"color": "lightblue"}}, "data": {"name": "data-bf4a2cc191074a30b30981c28e9fc28b"}, "mark": {"type": "bar"}, "encoding": {"tooltip": [{"field": "type", "type": "nominal"}, {"field": "count", "type": "quantitative"}], "x": {"axis": {"labelAngle": 45}, "field": "type", "title": "Type", "type": "nominal"}, "y": {"field": "count", "title": "Count", "type": "quantitative"}}, "title": "Titles with numbers in them sorted by Epochs", "$schema": "https://vega.github.io/schema/vega-lite/v6.1.0.json", "datasets": {"data-bf4a2cc191074a30b30981c28e9fc28b": [{"type": "Barok", "count": 1}, {"type": "Dwudziestolecie mi\u0119dzywojenne", "count": 6}, {"type": "Modernizm", "count": 3}, {"type": "Pozytywizm", "count": 8}, {"type": "Romantyzm", "count": 7}, {"type": "Staro\u017cytno\u015b\u0107", "count": 36}, {"type": "Wsp\u00f3\u0142czesno\u015b\u0107", "count": 69}]}};
