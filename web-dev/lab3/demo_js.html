
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Demo Zdarzeń JS</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f0f0;
            margin: 20px;
        }

        .kontener {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 15px;
            margin: 5px 0;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
        }

        #ekranWiadomosci {
            margin-top: 20px;
            padding: 10px;
            background-color: #333;
            color: #fff;
            font-family: monospace;
            min-height: 100px;
            border-radius: 4px;
        }

        #ekranWiadomosci p {
            margin: 5px 0;
            border-bottom: 1px dashed #555;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="kontener">
        <h1>Zarządzanie Zdarzeniami w JS</h1>
        
        <button onclick="obsluzInline()">Zdarzenie Inline</button>
        
        <button id="przyciskWielokrotny">Wiele akcji (addEventListener)</button>
        <button id="przyciskJednorazowy">Akcja jednorazowa (usuwanie listenera)</button>
        
        <div id="ekranWiadomosci">Tutaj pojawią się logi z kliknięć...</div>
    </div>

    <script>
        const ekran = document.getElementById("ekranWiadomosci");

        function logujNaEkranie(wiadomosc) {
            ekran.innerHTML += "<p>> " + wiadomosc + "</p>";
        }

        // 1. Funkcja dla zdarzenia INLINE
        function obsluzInline() {
            logujNaEkranie("Wywołano funkcję podpiętą przez atrybut onclick (inline).");
            console.log("Log z inline widoczny w konsoli DevTools"); 
        }

        // 2. Obsługa zdarzeń przez ADDEVENTLISTENER
        const przyciskWielokrotny = document.getElementById("przyciskWielokrotny");

        przyciskWielokrotny.addEventListener("click", function() {
            logujNaEkranie("Przycisk 2: Pierwszy listener zadziałał.");
        });

        przyciskWielokrotny.addEventListener("click", function() {
            logujNaEkranie("Przycisk 2: Drugi listener również zadziałał (nie nadpisano pierwszego).");
        });

        // 3. Dodawanie i usuwanie LISTNERA
        const przyciskJednorazowy = document.getElementById("przyciskJednorazowy");

        function akcjaJednorazowa() {
            logujNaEkranie("Przycisk 3: Kliknięto. Ten listener zaraz zostanie usunięty.");
            
            przyciskJednorazowy.removeEventListener("click", akcjaJednorazowa);
            
            logujNaEkranie("Przycisk 3: Listener usunięty. Kolejne kliknięcia nic nie zrobią.");
        }

        przyciskJednorazowy.addEventListener("click", akcjaJednorazowa);
    </script>
</body>
</html>
